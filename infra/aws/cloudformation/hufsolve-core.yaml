AWSTemplateFormatVersion: "2010-09-09"
Description: HUFSOLVE API, worker, SQS, ALB, and RDS core infrastructure.

Parameters:
  ProjectName:
    Type: String
    Default: hufsolve
  VpcId:
    Type: AWS::EC2::VPC::Id
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  KeyName:
    Type: String
    Default: ""
    Description: Optional EC2 key pair for emergency SSH access. Leave empty to use SSM only.
  AllowedSshCidr:
    Type: String
    Default: 127.0.0.1/32
    Description: SSH source CIDR used only when KeyName is set. Narrow this to your own IP.
  AssignPublicIpToInstances:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Set true only for the low-cost classroom profile that reuses public subnets.
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
  ApiInstanceType:
    Type: String
    Default: t3.micro
  WorkerInstanceType:
    Type: String
    Default: t3.small
  ApiMinSize:
    Type: Number
    Default: 0
    Description: Keep 0 outside exam windows. The wake Lambda raises desired capacity on demand.
  ApiDesiredCapacity:
    Type: Number
    Default: 0
  ApiMaxSize:
    Type: Number
    Default: 3
  WorkerMinSize:
    Type: Number
    Default: 0
    Description: Keep 0 outside exam windows. SQS backlog or the wake Lambda starts workers.
  WorkerDesiredCapacity:
    Type: Number
    Default: 0
  WorkerMaxSize:
    Type: Number
    Default: 5
  ApiWakeDesiredCapacity:
    Type: Number
    Default: 1
    Description: API ASG desired capacity set by the serverless wake endpoint.
  WorkerWakeDesiredCapacity:
    Type: Number
    Default: 1
    Description: Worker ASG desired capacity set by the serverless wake endpoint.
  IdleScaleInMinutes:
    Type: Number
    Default: 20
    Description: Minutes of no ALB requests and no SQS backlog before the guard scales EC2 to zero.
  IdleAlarmEvaluationPeriods:
    Type: Number
    Default: 20
    Description: One-minute periods used by the CloudWatch idle alarm.
  CostGuardScheduleExpression:
    Type: String
    Default: rate(5 minutes)
    Description: EventBridge schedule that rechecks idle EC2 capacity even if an alarm transition is missed.
  RepositoryUrl:
    Type: String
    Description: Git URL that EC2 instances can clone.
  RepositoryBranch:
    Type: String
    Default: main
  FrontendOrigin:
    Type: String
    Default: http://localhost:5173
    Description: CORS origin for the deployed frontend.
  DbName:
    Type: String
    Default: hufsolve
  DbUsername:
    Type: String
    Default: hufsolve_user
  DbInstanceClass:
    Type: String
    Default: db.t3.micro

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyName, ""]]
  AssignPublicIp: !Equals [!Ref AssignPublicIpToInstances, "true"]

Resources:
  JudgeDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${ProjectName}-judge-dlq
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true

  JudgeQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${ProjectName}-judge-queue
      VisibilityTimeout: 120
      SqsManagedSseEnabled: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt JudgeDeadLetterQueue.Arn
        maxReceiveCount: 3

  PythonRunnerRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}/python-runner
      EmptyOnDelete: true
      ImageScanningConfiguration:
        ScanOnPush: true

  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
          - Id: ExpireSampleRunArtifacts
            Status: Enabled
            Prefix: sample-runs/
            ExpirationInDays: 30
            NoncurrentVersionExpiration:
              NoncurrentDays: 30

  ArtifactBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArtifactBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !GetAtt ArtifactBucket.Arn
              - !Sub ${ArtifactBucket.Arn}/*
            Condition:
              Bool:
                aws:SecureTransport: "false"

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /${ProjectName}/api
      RetentionInDays: 7

  WorkerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /${ProjectName}/worker
      RetentionInDays: 7

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: HUFSOLVE ALB inbound HTTP
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  ApiSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: HUFSOLVE API server
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref AlbSecurityGroup
        - !If
          - HasKeyPair
          - IpProtocol: tcp
            FromPort: 22
            ToPort: 22
            CidrIp: !Ref AllowedSshCidr
          - !Ref AWS::NoValue

  WorkerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: HUFSOLVE stateless judge worker
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - !If
          - HasKeyPair
          - IpProtocol: tcp
            FromPort: 22
            ToPort: 22
            CidrIp: !Ref AllowedSshCidr
          - !Ref AWS::NoValue

  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: HUFSOLVE RDS MySQL
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref ApiSecurityGroup
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref WorkerSecurityGroup

  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: HUFSOLVE private DB subnets
      SubnetIds: !Ref PrivateSubnetIds

  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub ${ProjectName}-mysql
      Engine: mysql
      EngineVersion: "8.0"
      DBInstanceClass: !Ref DbInstanceClass
      AllocatedStorage: 20
      StorageType: gp3
      StorageEncrypted: true
      DBName: !Ref DbName
      MasterUsername: !Ref DbUsername
      ManageMasterUserPassword: true
      PubliclyAccessible: false
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup
      DBSubnetGroupName: !Ref DbSubnetGroup
      BackupRetentionPeriod: 1

  ApiInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: hufsolve-api-sqs-send
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt JudgeQueue.Arn
        - PolicyName: hufsolve-api-data-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !GetAtt Database.MasterUserSecret.SecretArn
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub ${ArtifactBucket.Arn}/problems/*/versions/*/statement.json
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource:
                  - !Sub ${ArtifactBucket.Arn}/problems/*
                  - !Sub ${ArtifactBucket.Arn}/submissions/*
                  - !Sub ${ArtifactBucket.Arn}/sample-runs/*

  WorkerInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: hufsolve-worker-ecr-pull
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource: !GetAtt PythonRunnerRepository.Arn
        - PolicyName: hufsolve-worker-sqs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:ChangeMessageVisibility
                  - sqs:GetQueueAttributes
                Resource: !GetAtt JudgeQueue.Arn
        - PolicyName: hufsolve-worker-data-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !GetAtt Database.MasterUserSecret.SecretArn
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub ${ArtifactBucket.Arn}/problems/*
                  - !Sub ${ArtifactBucket.Arn}/submissions/*
                  - !Sub ${ArtifactBucket.Arn}/sample-runs/*
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource:
                  - !Sub ${ArtifactBucket.Arn}/submissions/*
                  - !Sub ${ArtifactBucket.Arn}/sample-runs/*

  ApiInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref ApiInstanceRole

  WorkerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref WorkerInstanceRole

  ServerlessControlFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: hufsolve-serverless-control
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - autoscaling:DescribeAutoScalingGroups
                  - autoscaling:SetDesiredCapacity
                Resource: "*"
              - Effect: Allow
                Action:
                  - sqs:GetQueueAttributes
                Resource: !GetAtt JudgeQueue.Arn
              - Effect: Allow
                Action:
                  - cloudwatch:GetMetricStatistics
                Resource: "*"

  ApiTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: 8000
      TargetType: instance
      HealthCheckPath: /health
      Matcher:
        HttpCode: "200"

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      Subnets: !Ref PublicSubnetIds
      SecurityGroups:
        - !Ref AlbSecurityGroup

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ApiTargetGroup

  ApiLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: !Ref ApiInstanceType
        KeyName: !If [HasKeyPair, !Ref KeyName, !Ref AWS::NoValue]
        IamInstanceProfile:
          Arn: !GetAtt ApiInstanceProfile.Arn
        NetworkInterfaces:
          - AssociatePublicIpAddress: !If [AssignPublicIp, true, false]
            DeviceIndex: 0
            Groups:
              - !Ref ApiSecurityGroup
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euo pipefail
            dnf update -y
            dnf install -y amazon-cloudwatch-agent git python3.11 python3.11-pip
            mkdir -p /opt/hufsolve
            git clone --branch ${RepositoryBranch} ${RepositoryUrl} /opt/hufsolve/app
            cd /opt/hufsolve/app
            python3.11 -m pip install --upgrade pip
            python3.11 -m pip install -r backend/requirements.txt
            python3.11 - <<'PY'
            import json
            from pathlib import Path
            from urllib.parse import quote_plus

            import boto3

            secret = boto3.client("secretsmanager", region_name="${AWS::Region}").get_secret_value(
                SecretId="${Database.MasterUserSecret.SecretArn}"
            )
            data = json.loads(secret["SecretString"])
            username = quote_plus(data["username"])
            password = quote_plus(data["password"])
            database = quote_plus("${DbName}")
            Path("/tmp/hufsolve-database-url").write_text(
                f"mysql+pymysql://{username}:{password}@${Database.Endpoint.Address}:3306/{database}",
                encoding="utf-8",
            )
            Path("/tmp/hufsolve-database-url").chmod(0o600)
            PY
            DATABASE_URL=$(cat /tmp/hufsolve-database-url)
            install -m 600 /dev/null /opt/hufsolve/app/.env
            cat >/opt/hufsolve/app/.env <<ENV
            APP_ENV=aws
            BACKEND_HOST=0.0.0.0
            BACKEND_PORT=8000
            BACKEND_CORS_ORIGINS=${FrontendOrigin}
            DATABASE_URL=$DATABASE_URL
            QUEUE_BACKEND=sqs
            AWS_REGION=${AWS::Region}
            SQS_QUEUE_URL=${JudgeQueue}
            ARTIFACT_BACKEND=s3
            S3_BUCKET_NAME=${ArtifactBucket}
            AUTO_CREATE_TABLES=false
            AUTO_SEED=false
            ENV
            rm -f /tmp/hufsolve-database-url
            python3.11 -m backend.app.bootstrap --seed-if-empty
            touch /var/log/hufsolve-api.log
            cat >/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json <<'CWAGENT'
            {
              "logs": {
                "logs_collected": {
                  "files": {
                    "collect_list": [
                      {
                        "file_path": "/var/log/hufsolve-api.log",
                        "log_group_name": "${ApiLogGroup}",
                        "log_stream_name": "{instance_id}"
                      }
                    ]
                  }
                }
              }
            }
            CWAGENT
            cat >/etc/systemd/system/hufsolve-api.service <<'UNIT'
            [Unit]
            Description=HUFSOLVE FastAPI API Server
            After=network-online.target
            Wants=network-online.target

            [Service]
            WorkingDirectory=/opt/hufsolve/app
            ExecStart=/usr/bin/python3.11 -m uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
            StandardOutput=append:/var/log/hufsolve-api.log
            StandardError=append:/var/log/hufsolve-api.log
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            UNIT
            /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
              -a fetch-config \
              -m ec2 \
              -s \
              -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
            systemctl daemon-reload
            systemctl enable --now hufsolve-api

  WorkerLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: !Ref WorkerInstanceType
        KeyName: !If [HasKeyPair, !Ref KeyName, !Ref AWS::NoValue]
        IamInstanceProfile:
          Arn: !GetAtt WorkerInstanceProfile.Arn
        NetworkInterfaces:
          - AssociatePublicIpAddress: !If [AssignPublicIp, true, false]
            DeviceIndex: 0
            Groups:
              - !Ref WorkerSecurityGroup
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euo pipefail
            dnf update -y
            dnf install -y amazon-cloudwatch-agent docker git python3.11 python3.11-pip
            systemctl enable --now docker
            usermod -aG docker ec2-user
            mkdir -p /opt/hufsolve
            git clone --branch ${RepositoryBranch} ${RepositoryUrl} /opt/hufsolve/app
            cd /opt/hufsolve/app
            python3.11 -m pip install --upgrade pip
            python3.11 -m pip install -r worker/requirements.txt
            RUNNER_IMAGE_URI=${PythonRunnerRepository.RepositoryUri}:3.11
            RUNNER_REGISTRY=$(echo "$RUNNER_IMAGE_URI" | cut -d/ -f1)
            JUDGE_DOCKER_IMAGE=judge-python:3.11
            if command -v aws >/dev/null \
              && aws ecr get-login-password --region ${AWS::Region} | docker login --username AWS --password-stdin "$RUNNER_REGISTRY" \
              && docker pull "$RUNNER_IMAGE_URI"; then
              JUDGE_DOCKER_IMAGE="$RUNNER_IMAGE_URI"
              docker logout "$RUNNER_REGISTRY"
            else
              docker logout "$RUNNER_REGISTRY" >/dev/null 2>&1 || true
              docker build -t "$JUDGE_DOCKER_IMAGE" docker/python-runner
            fi
            python3.11 - <<'PY'
            import json
            from pathlib import Path
            from urllib.parse import quote_plus

            import boto3

            secret = boto3.client("secretsmanager", region_name="${AWS::Region}").get_secret_value(
                SecretId="${Database.MasterUserSecret.SecretArn}"
            )
            data = json.loads(secret["SecretString"])
            username = quote_plus(data["username"])
            password = quote_plus(data["password"])
            database = quote_plus("${DbName}")
            Path("/tmp/hufsolve-database-url").write_text(
                f"mysql+pymysql://{username}:{password}@${Database.Endpoint.Address}:3306/{database}",
                encoding="utf-8",
            )
            Path("/tmp/hufsolve-database-url").chmod(0o600)
            PY
            DATABASE_URL=$(cat /tmp/hufsolve-database-url)
            install -m 600 /dev/null /opt/hufsolve/app/.env
            cat >/opt/hufsolve/app/.env <<ENV
            APP_ENV=aws
            DATABASE_URL=$DATABASE_URL
            QUEUE_BACKEND=sqs
            AWS_REGION=${AWS::Region}
            SQS_QUEUE_URL=${JudgeQueue}
            ARTIFACT_BACKEND=s3
            S3_BUCKET_NAME=${ArtifactBucket}
            WORKER_MAX_RECEIVE_COUNT=3
            JUDGE_DOCKER_IMAGE=$JUDGE_DOCKER_IMAGE
            JUDGE_MAX_OUTPUT_BYTES=65536
            JUDGE_CONTAINER_STARTUP_GRACE_SECONDS=5
            AUTO_CREATE_TABLES=false
            AUTO_SEED=false
            ENV
            rm -f /tmp/hufsolve-database-url
            touch /var/log/hufsolve-worker.log
            cat >/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json <<'CWAGENT'
            {
              "logs": {
                "logs_collected": {
                  "files": {
                    "collect_list": [
                      {
                        "file_path": "/var/log/hufsolve-worker.log",
                        "log_group_name": "${WorkerLogGroup}",
                        "log_stream_name": "{instance_id}"
                      }
                    ]
                  }
                }
              }
            }
            CWAGENT
            cat >/etc/systemd/system/hufsolve-worker.service <<'UNIT'
            [Unit]
            Description=HUFSOLVE Judge Worker
            After=network-online.target docker.service
            Wants=network-online.target
            Requires=docker.service

            [Service]
            WorkingDirectory=/opt/hufsolve/app
            ExecStart=/usr/bin/python3.11 -m worker.main
            StandardOutput=append:/var/log/hufsolve-worker.log
            StandardError=append:/var/log/hufsolve-worker.log
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            UNIT
            /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
              -a fetch-config \
              -m ec2 \
              -s \
              -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
            systemctl daemon-reload
            systemctl enable --now hufsolve-worker

  ApiAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier: !Ref PrivateSubnetIds
      MinSize: !Ref ApiMinSize
      DesiredCapacity: !Ref ApiDesiredCapacity
      MaxSize: !Ref ApiMaxSize
      TargetGroupARNs:
        - !Ref ApiTargetGroup
      LaunchTemplate:
        LaunchTemplateId: !Ref ApiLaunchTemplate
        Version: !GetAtt ApiLaunchTemplate.LatestVersionNumber

  WorkerAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier: !Ref PrivateSubnetIds
      MinSize: !Ref WorkerMinSize
      DesiredCapacity: !Ref WorkerDesiredCapacity
      MaxSize: !Ref WorkerMaxSize
      LaunchTemplate:
        LaunchTemplateId: !Ref WorkerLaunchTemplate
        Version: !GetAtt WorkerLaunchTemplate.LatestVersionNumber

  ApiCpuScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref ApiAutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 55

  WorkerScaleOutPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WorkerAutoScalingGroup
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: 1
      Cooldown: 120

  WorkerScaleInPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WorkerAutoScalingGroup
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: -1
      Cooldown: 180

  ServerlessControlFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-serverless-control
      Description: Wakes HUFSOLVE EC2 fleets on exam requests and scales them to zero after idle periods.
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ServerlessControlFunctionRole.Arn
      Timeout: 30
      Environment:
        Variables:
          API_ASG_NAME: !Ref ApiAutoScalingGroup
          WORKER_ASG_NAME: !Ref WorkerAutoScalingGroup
          QUEUE_URL: !Ref JudgeQueue
          ALB_FULL_NAME: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
          FRONTEND_ORIGIN: !Ref FrontendOrigin
          API_WARM_DESIRED: !Ref ApiWakeDesiredCapacity
          WORKER_WARM_DESIRED: !Ref WorkerWakeDesiredCapacity
          IDLE_SCALE_IN_MINUTES: !Ref IdleScaleInMinutes
      Code:
        ZipFile: |
          import json, os
          from datetime import datetime, timedelta, timezone
          import boto3

          ag = boto3.client("autoscaling")
          cw = boto3.client("cloudwatch")
          qs = boto3.client("sqs")
          API = os.environ["API_ASG_NAME"]
          WORKER = os.environ["WORKER_ASG_NAME"]
          QUEUE = os.environ["QUEUE_URL"]
          ALB = os.environ["ALB_FULL_NAME"]
          ORIGIN = os.environ.get("FRONTEND_ORIGIN", "*")
          API_WARM = int(os.environ.get("API_WARM_DESIRED", "1"))
          WORKER_WARM = int(os.environ.get("WORKER_WARM_DESIRED", "1"))
          IDLE_MIN = int(os.environ.get("IDLE_SCALE_IN_MINUTES", "20"))

          def handler(event, context):
              if isinstance(event, dict) and "http" in event.get("requestContext", {}):
                  try:
                      return wake()
                  except Exception as exc:
                      return response(500, {"error": str(exc)})
              return guard()

          def wake():
              return response(202, {"message": "wake requested", "actions": [
                  capacity(API, API_WARM, "wake-api"),
                  capacity(WORKER, WORKER_WARM, "wake-worker"),
              ]})

          def guard():
              q = queue_counts()
              total = q["visible"] + q["notVisible"] + q["delayed"]
              recent = request_count()
              actions = []
              worker = group(WORKER)
              api = group(API)
              if total and worker["DesiredCapacity"] < WORKER_WARM:
                  actions.append(capacity(WORKER, WORKER_WARM, "queue-worker-wake"))
              if not total and worker["DesiredCapacity"] > 0:
                  actions.append(capacity(WORKER, 0, "idle-worker-stop"))
              if not total and not recent and api["DesiredCapacity"] > 0:
                  actions.append(capacity(API, 0, "idle-api-stop"))
              return {"mode": "cost-guard", "queue": q, "recentAlbRequestCount": recent, "actions": actions}

          def response(code, body):
              return {"statusCode": code, "headers": {
                  "Access-Control-Allow-Origin": ORIGIN,
                  "Access-Control-Allow-Headers": "content-type",
                  "Access-Control-Allow-Methods": "OPTIONS,POST",
                  "Content-Type": "application/json",
                  "Vary": "Origin",
              }, "body": json.dumps(body)}

          def queue_counts():
              attrs = qs.get_queue_attributes(QueueUrl=QUEUE, AttributeNames=[
                  "ApproximateNumberOfMessages",
                  "ApproximateNumberOfMessagesNotVisible",
                  "ApproximateNumberOfMessagesDelayed",
              ]).get("Attributes", {})
              return {
                  "visible": int(attrs.get("ApproximateNumberOfMessages", "0")),
                  "notVisible": int(attrs.get("ApproximateNumberOfMessagesNotVisible", "0")),
                  "delayed": int(attrs.get("ApproximateNumberOfMessagesDelayed", "0")),
              }

          def request_count():
              end = datetime.now(timezone.utc)
              res = cw.get_metric_statistics(
                  Namespace="AWS/ApplicationELB",
                  MetricName="RequestCount",
                  Dimensions=[{"Name": "LoadBalancer", "Value": ALB}],
                  StartTime=end - timedelta(minutes=IDLE_MIN),
                  EndTime=end,
                  Period=60,
                  Statistics=["Sum"],
              )
              return int(sum(p.get("Sum", 0) for p in res.get("Datapoints", [])))

          def group(name):
              groups = ag.describe_auto_scaling_groups(AutoScalingGroupNames=[name]).get("AutoScalingGroups", [])
              if not groups:
                  raise RuntimeError(f"ASG not found: {name}")
              return groups[0]

          def capacity(name, desired, reason):
              g = group(name)
              current = int(g["DesiredCapacity"])
              target = min(max(int(desired), int(g["MinSize"])), int(g["MaxSize"]))
              changed = current != target
              if changed:
                  ag.set_desired_capacity(AutoScalingGroupName=name, DesiredCapacity=target, HonorCooldown=False)
              return {"asg": name, "reason": reason, "changed": changed, "previousDesiredCapacity": current, "desiredCapacity": target}

  ServerlessWakeApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${ProjectName}-wake
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - !Ref FrontendOrigin
        AllowMethods:
          - OPTIONS
          - POST
        AllowHeaders:
          - content-type

  ServerlessWakeIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ServerlessWakeApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations
        - FunctionArn: !GetAtt ServerlessControlFunction.Arn
      PayloadFormatVersion: "2.0"

  ServerlessWakeRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ServerlessWakeApi
      RouteKey: POST /wake
      Target: !Sub integrations/${ServerlessWakeIntegration}

  ServerlessWakeStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ServerlessWakeApi
      StageName: "$default"
      AutoDeploy: true

  ServerlessWakeApiInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ServerlessControlFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${ServerlessWakeApi}/*/POST/wake

  CloudWatchAlarmInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ServerlessControlFunction
      Action: lambda:InvokeFunction
      Principal: lambda.alarms.cloudwatch.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  CostGuardScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Periodically checks whether HUFSOLVE EC2 fleets should be scaled to zero.
      ScheduleExpression: !Ref CostGuardScheduleExpression
      State: ENABLED
      Targets:
        - Arn: !GetAtt ServerlessControlFunction.Arn
          Id: hufsolve-serverless-control
          Input: '{"source":"hufsolve.cost-guard"}'

  CostGuardSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ServerlessControlFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt CostGuardScheduleRule.Arn

  WorkerQueueHighAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Scale out workers when judge queue grows.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt JudgeQueue.QueueName
      Statistic: Average
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref WorkerScaleOutPolicy

  WorkerQueueLowAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: CloudWatchAlarmInvokePermission
    Properties:
      AlarmDescription: Scale in workers when judge queue is drained.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt JudgeQueue.QueueName
      Statistic: Average
      Period: 60
      EvaluationPeriods: 5
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref WorkerScaleInPolicy
        - !GetAtt ServerlessControlFunction.Arn

  ApiIdleNoRequestsAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: CloudWatchAlarmInvokePermission
    Properties:
      AlarmDescription: Invoke cost guard when the API fleet has no ALB requests for the idle window.
      Namespace: AWS/ApplicationELB
      MetricName: RequestCount
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: !Ref IdleAlarmEvaluationPeriods
      DatapointsToAlarm: !Ref IdleAlarmEvaluationPeriods
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !GetAtt ServerlessControlFunction.Arn

  OperationsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub ${ProjectName}-operations
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Judge Queue",
                "region": "${AWS::Region}",
                "metrics": [
                  ["AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "${JudgeQueue.QueueName}"],
                  [".", "ApproximateAgeOfOldestMessage", ".", "."]
                ],
                "period": 60,
                "stat": "Average"
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Worker Auto Scaling",
                "region": "${AWS::Region}",
                "metrics": [
                  ["AWS/AutoScaling", "GroupDesiredCapacity", "AutoScalingGroupName", "${WorkerAutoScalingGroup}"],
                  [".", "GroupInServiceInstances", ".", "."]
                ],
                "period": 60,
                "stat": "Average"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "API Auto Scaling",
                "region": "${AWS::Region}",
                "metrics": [
                  ["AWS/AutoScaling", "GroupDesiredCapacity", "AutoScalingGroupName", "${ApiAutoScalingGroup}"],
                  [".", "GroupInServiceInstances", ".", "."]
                ],
                "period": 60,
                "stat": "Average"
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Serverless Control Lambda",
                "region": "${AWS::Region}",
                "metrics": [
                  ["AWS/Lambda", "Invocations", "FunctionName", "${ServerlessControlFunction}"],
                  [".", "Errors", ".", "."]
                ],
                "period": 60,
                "stat": "Sum"
              }
            }
          ]
        }

Outputs:
  ApiBaseUrl:
    Value: !Sub http://${ApplicationLoadBalancer.DNSName}
  QueueUrl:
    Value: !Ref JudgeQueue
  DeadLetterQueueUrl:
    Value: !Ref JudgeDeadLetterQueue
  PythonRunnerRepositoryUri:
    Value: !GetAtt PythonRunnerRepository.RepositoryUri
  DatabaseEndpoint:
    Value: !GetAtt Database.Endpoint.Address
  DatabaseSecretArn:
    Value: !GetAtt Database.MasterUserSecret.SecretArn
  ArtifactBucketName:
    Value: !Ref ArtifactBucket
  ApiLogGroupName:
    Value: !Ref ApiLogGroup
  WorkerLogGroupName:
    Value: !Ref WorkerLogGroup
  OperationsDashboardName:
    Value: !Ref OperationsDashboard
  ServerlessWakeApiUrl:
    Value: !Sub https://${ServerlessWakeApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/wake
  ServerlessControlFunctionName:
    Value: !Ref ServerlessControlFunction
  ApiIdleNoRequestsAlarmName:
    Value: !Ref ApiIdleNoRequestsAlarm
  ApiAutoScalingGroupName:
    Value: !Ref ApiAutoScalingGroup
  WorkerAutoScalingGroupName:
    Value: !Ref WorkerAutoScalingGroup
